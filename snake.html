<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>贪吃蛇 Snake</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:SimHei;
  text-align:center;
}

/* 画布 */
canvas{
  background:#000;
  display:block;
  margin:10px auto;
  border:1px solid #333;
}

/* 分数 */
#score{
  font-size:20px;
  margin:10px;
}

/* 排行榜 */
#rank{
  margin:10px auto;
  width:90%;
  max-width:400px;
  text-align:left;
}

/* ===== 控制键（重点优化） ===== */
#controls{
  position:fixed;
  bottom:25px;
  left:0;
  right:0;
}

.row{
  display:flex;
  justify-content:center;
}

button{
  width:85px;
  height:85px;
  margin:8px;
  font-size:30px;
  border-radius:18px;
  border:none;
  background:#222;
  color:#fff;
}

button:active{
  background:#555;
}

#centerBtn{
  background:#444;
}
</style>
</head>

<body>

<h2>🐍 贪吃蛇</h2>

<canvas id="game"></canvas>

<div id="score">分数: 0</div>

<h3>排行榜（Snake）</h3>
<div id="rank">加载中...</div>

<!-- 十字按键 -->
<div id="controls">
  <div class="row">
    <button onclick="setDir(0,-1)">↑</button>
  </div>
  <div class="row">
    <button onclick="setDir(-1,0)">←</button>
    <button id="centerBtn" onclick="restart()">●</button>
    <button onclick="setDir(1,0)">→</button>
  </div>
  <div class="row">
    <button onclick="setDir(0,1)">↓</button>
  </div>
</div>

<script>
// ================= SUPABASE =================
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth * 0.92;
  canvas.height = window.innerHeight * 0.45;
}
resize();
window.onresize = resize;

// ================= 游戏参数 =================
const size = 18;

let snake, food, dir, score, dead;

function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  food = spawnFood();
  score = 0;
  dead = false;
}

init();

// ================= 食物 =================
function spawnFood(){
  return {
    x: Math.floor(Math.random()*(canvas.width/size)),
    y: Math.floor(Math.random()*(canvas.height/size))
  };
}

// ================= 控制 =================
function setDir(x,y){
  if(dir.x + x === 0 && dir.y + y === 0) return;
  dir = {x,y};
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") setDir(0,-1);
  if(e.key==="ArrowDown") setDir(0,1);
  if(e.key==="ArrowLeft") setDir(-1,0);
  if(e.key==="ArrowRight") setDir(1,0);
});

// ================= 重启 =================
function restart(){
  init();
}

// ================= 游戏循环 =================
setInterval(()=>{
  if(dead) return;

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // 撞墙
  if(head.x<0||head.y<0||
     head.x>canvas.width/size||
     head.y>canvas.height/size){
    gameOver();
    return;
  }

  // 撞自己
  for(let s of snake){
    if(s.x===head.x && s.y===head.y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // 吃食物
  if(head.x===food.x && head.y===food.y){
    score++;
    food = spawnFood();
  }else{
    snake.pop();
  }

  draw();

},100);

// ================= 绘制 =================
function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 蛇
  ctx.fillStyle="lime";
  snake.forEach(s=>{
    ctx.fillRect(s.x*size,s.y*size,size-2,size-2);
  });

  // 食物
  ctx.fillStyle="red";
  ctx.fillRect(food.x*size,food.y*size,size-2,size-2);

  document.getElementById("score").innerText="分数: "+score;
}

// ================= GAME OVER =================
function gameOver(){
  dead = true;

  let name = prompt("游戏结束，输入名字：");
  if(name){
    submitScore(name,score);
  }
  loadRank();
}

// ================= 提交分数（修复版） =================
function submitScore(name,score){
  fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json",
      "Prefer":"return=representation"
    },
    body:JSON.stringify({
      name:name,
      score:score,
      game_type:"snake"
    })
  })
  .then(res=>{
    if(!res.ok){
      console.log("提交失败");
    }
    loadRank();
  })
  .catch(err=>{
    console.log("网络错误",err);
  });
}

// ================= 排行榜 =================
function loadRank(){
  fetch(
    SUPABASE_URL+
    "/rest/v1/leaderboard?select=name,score&game_type=eq.snake&order=score.desc&limit=10",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    }
  )
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach((x,i)=>{
      html += (i+1)+". "+x.name+" - "+x.score+"<br>";
    });
    document.getElementById("rank").innerHTML = html || "暂无数据";
  });
}

loadRank();
</script>

</body>
</html>
