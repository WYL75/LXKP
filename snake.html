<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>贪吃蛇</title>
<style>
*{ box-sizing:border-box; }
body{
  margin:0;
  background:#1a0533;
  color:#fff;
  font-family:SimHei,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding-bottom:20px;
}
#top{
  width:100%;
  max-width:380px;
  display:flex;
  justify-content:space-between;
  padding:10px 14px;
  font-size:16px;
}
#wrap{ position:relative; margin-top:8px; }
canvas{
  display:block;
  background:#0b0618;
  border:1px solid rgba(255,255,255,.15);
  border-radius:6px;
}
#overlay{
  display:none;
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  border-radius:6px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}
#overlay.show{ display:flex; }
#overlay h2{ margin:0; font-size:22px; color:#f87171; }
#overlay p { margin:0; font-size:14px; color:#c4b5fd; }
#nameInput{
  width:200px;
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #7c3aed;
  background:#1a0533;
  color:#fff;
  font-size:15px;
  font-family:SimHei,sans-serif;
  text-align:center;
  outline:none;
}
#nameInput:focus{ border-color:#a78bfa; }
#submitBtn{
  padding:9px 28px;
  background:#7c3aed;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-family:SimHei,sans-serif;
  cursor:pointer;
}
#submitBtn:hover{ background:#6d28d9; }
#rankWrap{
  width:100%;
  max-width:380px;
  padding:0 14px;
  margin-top:10px;
}
#rankWrap h3{ margin:6px 0; font-size:15px; color:#a78bfa; }
#rank{ font-size:14px; line-height:1.8; color:#e2d9f3; }
#controls{ margin-top:16px; }
.dpad{ display:flex; flex-direction:column; align-items:center; gap:6px; }
.middle{ display:flex; gap:46px; }
.dpad button{
  width:66px;
  height:66px;
  font-size:22px;
  border-radius:12px;
  background:#7c3aed;
  color:#fff;
  border:none;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.dpad button:active{ transform:scale(0.92); background:#5b21b6; }
</style>
</head>
<body>

<div id="top">
  <div>分数：<b id="score">0</b></div>
  <div>最高：<b id="best">0</b></div>
</div>

<div id="wrap">
  <canvas id="c" width="360" height="360"></canvas>
  <div id="overlay">
    <h2>游戏结束</h2>
    <p id="finalScore"></p>
    <input id="nameInput" placeholder="输入你的名字" maxlength="12">
    <button id="submitBtn" onclick="handleSubmit()">提交并重玩</button>
  </div>
</div>

<div id="rankWrap">
  <h3>🏆 排行榜</h3>
  <div id="rank">加载中…</div>
</div>

<div id="controls">
  <div class="dpad">
    <button ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">▲</button>
    <div class="middle">
      <button ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">◀</button>
      <button ontouchstart="setDir(1,0)" onclick="setDir(1,0)">▶</button>
    </div>
    <button ontouchstart="setDir(0,1)" onclick="setDir(0,1)">▼</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const GRID = 20;
const CELL = canvas.width / GRID;

let snake, dir, nextDir, food, score, best = 0;
let loopTimer = null;

function initState(){
  snake = [{x:8, y:8}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  food = randFood();
  score = 0;
  document.getElementById("score").innerText = 0;
}

function randFood(){
  let pos;
  do {
    pos = { x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID) };
  } while(snake && snake.some(s => s.x===pos.x && s.y===pos.y));
  return pos;
}

function setDir(x, y){
  if(snake.length > 1 && x === -dir.x && y === -dir.y) return;
  nextDir = {x, y};
}

document.addEventListener("keydown", e => {
  const map = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
  if(map[e.key]){ e.preventDefault(); setDir(...map[e.key]); }
});

function startLoop(){
  if(loopTimer) clearInterval(loopTimer);
  loopTimer = setInterval(tick, 120);
}

function stopLoop(){
  if(loopTimer){ clearInterval(loopTimer); loopTimer = null; }
}

function tick(){
  dir = {...nextDir};
  const head = { x:snake[0].x + dir.x, y:snake[0].y + dir.y };

  if(head.x<0 || head.y<0 || head.x>=GRID || head.y>=GRID) return gameOver();
  if(snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    score++;
    if(score > best) best = score;
    document.getElementById("score").innerText = score;
    document.getElementById("best").innerText  = best;
    food = randFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw(){
  ctx.fillStyle = "#0b0618";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ef4444";
  ctx.beginPath();
  ctx.roundRect(food.x*CELL+1, food.y*CELL+1, CELL-2, CELL-2, 4);
  ctx.fill();

  snake.forEach((s, i) => {
    ctx.fillStyle = i===0 ? "#86efac" : "#4ade80";
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 3);
    ctx.fill();
  });
}

function gameOver(){
  stopLoop();
  document.getElementById("finalScore").innerText = `本次得分：${score}`;
  document.getElementById("nameInput").value = "";
  document.getElementById("overlay").classList.add("show");
}

function handleSubmit(){
  const name = document.getElementById("nameInput").value.trim();
  document.getElementById("overlay").classList.remove("show");
  if(name) submitScore(name, score).then(loadRank);
  initState();
  draw();
  startLoop();
}

async function submitScore(name, sc){
  try{
    await fetch(SUPABASE_URL + "/rest/v1/leaderboard", {
      method:"POST",
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ name, score:sc, game_type:"snake" })
    });
  } catch(e){ console.error("上传失败", e); }
}

async function loadRank(){
  try{
    const url = SUPABASE_URL
      + "/rest/v1/leaderboard"
      + "?select=name,score"
      + "&game_type=eq.snake"
      + "&order=score.desc"
      + "&limit=10";
    const r = await fetch(url, {
      headers:{
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
    const data = await r.json();
    const medals = ["🥇","🥈","🥉"];
    document.getElementById("rank").innerHTML = Array.isArray(data) && data.length
      ? data.map((x,i) => `${medals[i]||i+1+"."} ${x.name} — ${x.score}`).join("<br>")
      : "暂无数据";
  } catch(e){
    document.getElementById("rank").innerText = "加载失败";
  }
}

initState();
draw();
startLoop();
loadRank();
</script>
</body>
</html>
