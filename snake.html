<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>贪吃蛇</title>

<style>
body{
  margin:0;
  background:#1a0533;
  color:#fff;
  font-family:SimHei;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#top{
  width:100%;
  max-width:520px;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

canvas{
  background:#0b0618;
  margin-top:10px;
  border:1px solid rgba(255,255,255,.15);
}

/* ===== 排行榜 ===== */
#rank{
  width:90%;
  max-width:400px;
  margin-top:10px;
  font-size:14px;
  text-align:left;
  color:#fff;
}

/* ===== 十字按键 ===== */
#controls{
  margin-top:15px;
  width:100%;
  max-width:520px;
  display:flex;
  justify-content:center;
}

.dpad{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.middle{
  display:flex;
  gap:50px;
}

.dpad button{
  width:70px;
  height:70px;
  font-size:22px;
  border-radius:12px;
  background:#7c3aed;
  color:#fff;
  border:none;
}

.dpad button:active{
  transform:scale(0.92);
  background:#5b21b6;
}
</style>
</head>

<body>

<div id="top">
<div>分数：<b id="score">0</b></div>
<div>最高：<b id="best">0</b></div>
</div>

<canvas id="c" width="360" height="360"></canvas>

<h3>排行榜（Snake）</h3>
<div id="rank">加载中...</div>

<!-- 十字控制 -->
<div id="controls">
  <div class="dpad">
    <button onclick="setDir(0,-1)">▲</button>

    <div class="middle">
      <button onclick="setDir(-1,0)">◀</button>
      <button onclick="setDir(1,0)">▶</button>
    </div>

    <button onclick="setDir(0,1)">▼</button>
  </div>
</div>

<script>

// ================= SUPABASE =================
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

// ================= 游戏 =================
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const grid = 20;
const size = canvas.width / grid;

let snake = [{x:8,y:8}];
let dir = {x:1,y:0};
let food = randFood();

let score = 0;
let best = 0;

// ================= 食物 =================
function randFood(){
  return {
    x: Math.floor(Math.random()*grid),
    y: Math.floor(Math.random()*grid)
  };
}

// ================= 控制 =================
function setDir(x,y){
  if(snake.length>1){
    if(x === -dir.x && y === -dir.y) return;
  }
  dir = {x,y};
}

// 键盘
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") setDir(0,-1);
  if(e.key==="ArrowDown") setDir(0,1);
  if(e.key==="ArrowLeft") setDir(-1,0);
  if(e.key==="ArrowRight") setDir(1,0);
});

// ================= 游戏逻辑 =================
function update(){

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // 撞墙
  if(head.x<0||head.y<0||head.x>=grid||head.y>=grid){
    gameOver();
    return;
  }

  // 撞自己
  for(let s of snake){
    if(s.x===head.x && s.y===head.y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    best = Math.max(best,score);
    document.getElementById("score").innerText=score;
    document.getElementById("best").innerText=best;
    food = randFood();
  }else{
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle="#0b0618";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.fillRect(food.x*size,food.y*size,size,size);

  ctx.fillStyle="lime";
  snake.forEach(s=>{
    ctx.fillRect(s.x*size,s.y*size,size-2,size-2);
  });
}

function loop(){
  update();
  draw();
}

setInterval(loop,120);

// ================= 游戏结束 =================
function gameOver(){
  let name = prompt("游戏结束，输入名字：");
  if(name){
    submitScore(name,score);
  }
  reset();
}

// ================= 重置 =================
function reset(){
  snake=[{x:8,y:8}];
  dir={x:1,y:0};
  score=0;
  document.getElementById("score").innerText=0;
}

// ================= 上传分数 =================
function submitScore(name,score){
  fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      score:score,
      game_type:"snake"
    })
  }).then(loadRank);
}

// ================= 排行榜 =================
function loadRank(){
  fetch(
    SUPABASE_URL+
    "/rest/v1/leaderboard?select=name,score&game_type=eq.snake&order=score.desc&limit=10",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    }
  )
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach((x,i)=>{
      html += `${i+1}. ${x.name} - ${x.score}<br>`;
    });
    document.getElementById("rank").innerHTML =
      html || "暂无数据";
  });
}

loadRank();

</script>

</body>
</html>
