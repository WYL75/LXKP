<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>贪吃蛇</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:#1a0533;
  color:#fff;
  font-family:SimHei,sans-serif;
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 上方可滚动区域 */
#scrollArea{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8px 16px;
  gap:8px;
}

#top{
  width:100%;
  display:flex;
  justify-content:space-between;
  font-size:16px;
}

#wrap{ position:relative; }
canvas{
  display:block;
  background:#0b0618;
  border:1px solid rgba(255,255,255,.15);
  border-radius:6px;
}

#overlay{
  display:none;
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  border-radius:6px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}
#overlay.show{ display:flex; }
#overlay h2{ font-size:20px; color:#f87171; }
#overlay p { font-size:13px; color:#c4b5fd; }
#nameInput{
  width:180px;
  padding:7px 10px;
  border-radius:8px;
  border:1px solid #7c3aed;
  background:#1a0533;
  color:#fff;
  font-size:14px;
  font-family:SimHei,sans-serif;
  text-align:center;
  outline:none;
}
#submitBtn{
  padding:8px 24px;
  background:#7c3aed;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-family:SimHei,sans-serif;
  cursor:pointer;
}

#rankWrap{ width:100%; }
#rankWrap h3{ font-size:14px; color:#a78bfa; margin-bottom:4px; }
#rank{ font-size:13px; line-height:1.9; color:#e2d9f3; }

/* 底部固定按键区 */
#controls{
  flex-shrink:0;
  display:flex;
  justify-content:center;
  padding:10px 0 16px;
  background:#1a0533;
  border-top:1px solid rgba(255,255,255,.08);
}
.dpad{ display:flex; flex-direction:column; align-items:center; gap:6px; }
.middle{ display:flex; gap:44px; }
.dpad button{
  width:64px;
  height:64px;
  font-size:22px;
  border-radius:12px;
  background:#7c3aed;
  color:#fff;
  border:none;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  touch-action:manipulation;
}
.dpad button:active{ transform:scale(0.92); background:#5b21b6; }
</style>
</head>
<body>

<!-- 滚动区 -->
<div id="scrollArea">
  <div id="top">
    <div>分数：<b id="score">0</b></div>
    <div>最高：<b id="best">0</b></div>
  </div>

  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h2>游戏结束</h2>
      <p id="finalScore"></p>
      <input id="nameInput" placeholder="输入你的名字" maxlength="12">
      <button id="submitBtn" onclick="handleSubmit()">提交并重玩</button>
    </div>
  </div>

  <div id="rankWrap">
    <h3>🏆 排行榜</h3>
    <div id="rank">加载中…</div>
  </div>
</div>

<!-- 固定底部按键 -->
<div id="controls">
  <div class="dpad">
    <button ontouchstart="e(event,0,-1)" onclick="setDir(0,-1)">▲</button>
    <div class="middle">
      <button ontouchstart="e(event,-1,0)" onclick="setDir(-1,0)">◀</button>
      <button ontouchstart="e(event,1,0)" onclick="setDir(1,0)">▶</button>
    </div>
    <button ontouchstart="e(event,0,1)" onclick="setDir(0,1)">▼</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const GRID = 20;

const RAW = Math.min(window.innerWidth - 32, 480);
const CELL = Math.floor(RAW / GRID);
const SIZE = CELL * GRID;
canvas.width  = SIZE;
canvas.height = SIZE;

let snake, dir, nextDir, food, score, best = 0;
let loopTimer = null;

function initState(){
  snake = [{x:8, y:8}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  food = randFood();
  score = 0;
  document.getElementById("score").innerText = 0;
}

function randFood(){
  let pos;
  do {
    pos = { x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID) };
  } while(snake && snake.some(s => s.x===pos.x && s.y===pos.y));
  return pos;
}

function setDir(x, y){
  if(snake.length > 1 && x === -dir.x && y === -dir.y) return;
  nextDir = {x, y};
}

function e(evt, x, y){
  evt.preventDefault();
  setDir(x, y);
}

document.addEventListener("keydown", ev => {
  const map = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
  if(map[ev.key]){ ev.preventDefault(); setDir(...map[ev.key]); }
});

let tx=0, ty=0;
canvas.addEventListener("touchstart", ev=>{ tx=ev.touches[0].clientX; ty=ev.touches[0].clientY; },{passive:true});
canvas.addEventListener("touchend", ev=>{
  const dx=ev.changedTouches[0].clientX-tx;
  const dy=ev.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
},{passive:true});

function startLoop(){
  if(loopTimer) clearInterval(loopTimer);
  loopTimer = setInterval(tick, 120);
}
function stopLoop(){
  if(loopTimer){ clearInterval(loopTimer); loopTimer=null; }
}

function tick(){
  dir = {...nextDir};
  const head = { x:snake[0].x+dir.x, y:snake[0].y+dir.y };
  if(head.x<0||head.y<0||head.x>=GRID||head.y>=GRID) return gameOver();
  if(snake.some(s=>s.x===head.x&&s.y===head.y)) return gameOver();
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    score++;
    if(score>best) best=score;
    document.getElementById("score").innerText=score;
    document.getElementById("best").innerText=best;
    food=randFood();
  } else { snake.pop(); }
  draw();
}

function draw(){
  ctx.fillStyle="#0b0618";
  ctx.fillRect(0,0,SIZE,SIZE);
  ctx.fillStyle="#ef4444";
  ctx.beginPath();
  ctx.roundRect(food.x*CELL+1, food.y*CELL+1, CELL-2, CELL-2, 4);
  ctx.fill();
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0?"#86efac":"#4ade80";
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 3);
    ctx.fill();
  });
}

function gameOver(){
  stopLoop();
  document.getElementById("finalScore").innerText=`本次得分：${score}`;
  document.getElementById("nameInput").value="";
  document.getElementById("overlay").classList.add("show");
}

function handleSubmit(){
  const name=document.getElementById("nameInput").value.trim()||"玩家";
document.getElementById("overlay").classList.remove("show");
submitScore(name,score).then(loadRank);
  initState(); draw(); startLoop();
}

async function submitScore(name,sc){
  try{
    await fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
      method:"POST",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({name,score:sc,game_type:"snake"})
    });
  }catch(err){ console.error(err); }
}

async function loadRank(){
  try{
    const r=await fetch(
      SUPABASE_URL+"/rest/v1/leaderboard?select=name,score&game_type=eq.snake&order=score.desc&limit=10",
      { headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY} }
    );
    const data=await r.json();
    const medals=["🥇","🥈","🥉"];
    document.getElementById("rank").innerHTML=Array.isArray(data)&&data.length
      ?data.map((x,i)=>`${medals[i]||i+1+"."} ${x.name} — ${x.score}`).join("<br>")
      :"暂无数据";
  }catch(err){ document.getElementById("rank").innerText="加载失败"; }
}

initState(); draw(); startLoop(); loadRank();
</script>
</body>
</html>
