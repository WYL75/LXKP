<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>贪吃蛇</title>

<style>
body{margin:0;background:#1a0533;color:#fff;font-family:SimHei;display:flex;flex-direction:column;align-items:center}
canvas{background:#000;margin-top:10px}
#lb{width:100%;max-width:520px;margin-top:10px}
#controls{display:flex;justify-content:center;margin-top:10px}
button{width:70px;height:70px;background:#7c3aed;color:#fff;border:none;margin:5px}
</style>
</head>

<body>

<canvas id="c" width="360" height="360"></canvas>

<div id="controls">
<button onclick="dir(0,-1)">▲</button>
<button onclick="dir(-1,0)">◀</button>
<button onclick="dir(1,0)">▶</button>
<button onclick="dir(0,1)">▼</button>
</div>

<div id="lb">加载中...</div>

<script>

const URL="https://txwskivbvslcammgdbzw.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

let snake=[{x:5,y:5}],d={x:1,y:0},food={x:10,y:10};
let score=0,name="玩家";

function dir(x,y){d={x,y}}

document.addEventListener("keydown",e=>{
  if(e.key=="ArrowUp")dir(0,-1);
  if(e.key=="ArrowDown")dir(0,1);
  if(e.key=="ArrowLeft")dir(-1,0);
  if(e.key=="ArrowRight")dir(1,0);
});

function loop(){

  let head={x:snake[0].x+d.x,y:snake[0].y+d.y};

  if(head.x<0||head.y<0||head.x>19||head.y>19)reset();

  snake.unshift(head);

  if(head.x==food.x&&head.y==food.y){
    score++;
    food={x:Math.random()*19|0,y:Math.random()*19|0};
  }else snake.pop();

  draw();
}

function draw(){
  let c=document.getElementById("c").getContext("2d");
  c.clearRect(0,0,360,360);

  c.fillText("蛇",snake[0].x*18,snake[0].y*18);

  snake.forEach(s=>c.fillRect(s.x*18,s.y*18,15,15));
}

function reset(){
  submit(score);
  snake=[{x:5,y:5}];
  score=0;
}

async function submit(s){
  await fetch(URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      apikey:KEY,
      Authorization:"Bearer "+KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({name:"玩家",score:s,game_type:"snake"})
  });
  loadLB();
}

async function loadLB(){
  let r=await fetch(URL+"/rest/v1/leaderboard?select=name,score&game_type=eq.snake&order=score.desc&limit=3",
  {headers:{apikey:KEY,Authorization:"Bearer "+KEY}});

  let d=await r.json();
  document.getElementById("lb").innerHTML=
  "🐍蛇榜<br>"+d.map((x,i)=>`${i+1}.${x.name}-${x.score}`).join("<br>");
}

setInterval(loop,120);
loadLB();

</script>

</body>
</html>
