<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>贪吃蛇</title>
<style>
body {
  margin:0;
  text-align:center;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}
canvas {
  background:#000;
  display:block;
  margin:10px auto;
}
button {
  font-size:18px;
  padding:10px;
  margin:5px;
}
#controls {
  margin-top:10px;
}
.row {
  display:flex;
  justify-content:center;
}
</style>
</head>
<body>

<h2>🐍 贪吃蛇</h2>
<canvas id="game"></canvas>

<div id="controls">
  <div class="row">
    <button onclick="setDir(0,-1)">↑</button>
  </div>
  <div class="row">
    <button onclick="setDir(-1,0)">←</button>
    <button onclick="setDir(1,0)">→</button>
  </div>
  <div class="row">
    <button onclick="setDir(0,1)">↓</button>
  </div>
</div>

<h3 id="score">分数: 0</h3>

<h3>排行榜</h3>
<ul id="rank"></ul>

<script>
// ====== Supabase 配置 ======
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

// ====== 画布 ======
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth * 0.9;
  canvas.height = window.innerHeight * 0.5;
}
resize();
window.onresize = resize;

// ====== 游戏参数 ======
const size = 20;
let snake, food, dir, score, over;

// 初始化
function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  food = spawnFood();
  score = 0;
  over = false;
}
init();

// 食物
function spawnFood(){
  return {
    x: Math.floor(Math.random()* (canvas.width/size)),
    y: Math.floor(Math.random()* (canvas.height/size))
  };
}

// 控制方向（防止反向）
function setDir(x,y){
  if(dir.x + x === 0 && dir.y + y === 0) return;
  dir = {x,y};
}

// 键盘控制
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") setDir(0,-1);
  if(e.key==="ArrowDown") setDir(0,1);
  if(e.key==="ArrowLeft") setDir(-1,0);
  if(e.key==="ArrowRight") setDir(1,0);
});

// ====== 游戏循环 ======
function loop(){
  if(over) return;

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // 撞墙
  if(
    head.x < 0 ||
    head.y < 0 ||
    head.x >= canvas.width/size ||
    head.y >= canvas.height/size
  ){
    gameOver();
    return;
  }

  // 撞自己
  for(let s of snake){
    if(s.x === head.x && s.y === head.y){
      gameOver();
      return;
    }
  }

  snake.unshift(head);

  // 吃食物
  if(head.x === food.x && head.y === food.y){
    score++;
    food = spawnFood();
  } else {
    snake.pop();
  }

  draw();
}
setInterval(loop, 100);

// ====== 绘制 ======
function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 蛇
  ctx.fillStyle="lime";
  for(let s of snake){
    ctx.fillRect(s.x*size, s.y*size, size-2, size-2);
  }

  // 食物
  ctx.fillStyle="red";
  ctx.fillRect(food.x*size, food.y*size, size-2, size-2);

  document.getElementById("score").innerText="分数: "+score;
}

// ====== 游戏结束 ======
function gameOver(){
  over = true;
  setTimeout(()=>{
    const name = prompt("游戏结束，输入名字：");
    if(name) submitScore(name, score);
    init();
  },100);
}

// ====== 提交分数 ======
function submitScore(name, score){
  fetch(SUPABASE_URL + "/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name,
      score,
      game_type:"snake"
    })
  }).then(loadRank);
}

// ====== 加载排行榜 ======
function loadRank(){
  fetch(
    SUPABASE_URL +
    "/rest/v1/leaderboard?select=name,score&game_type=eq.snake&order=score.desc&limit=10",
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    }
  )
  .then(res=>res.json())
  .then(data=>{
    const ul=document.getElementById("rank");
    ul.innerHTML="";
    data.forEach(r=>{
      const li=document.createElement("li");
      li.innerText = r.name + " - " + r.score;
      ul.appendChild(li);
    });
  });
}

loadRank();
</script>

</body>
</html>
