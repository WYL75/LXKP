<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>贪吃蛇</title>

<style>
body{
  margin:0;
  background:#1a0533;
  color:#fff;
  font-family:SimHei;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#top{
  width:100%;
  max-width:520px;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

canvas{
  background:#0b0618;
  margin-top:10px;
  border:1px solid rgba(255,255,255,.15);
}

#controls{
  margin-top:10px;
  display:flex;
  gap:10px;
  width:100%;
  max-width:520px;
}

button{
  flex:1;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:#fff;
}
</style>
</head>

<body>

<div id="top">
<div>分数：<b id="score">0</b></div>
<div>最高：<b id="best">0</b></div>
</div>

<canvas id="c" width="360" height="360"></canvas>

<div id="controls">
<button onclick="setDir(0,-1)">⬆</button>
<button onclick="setDir(0,1)">⬇</button>
<button onclick="setDir(-1,0)">⬅</button>
<button onclick="setDir(1,0)">➡</button>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const grid = 20;
const size = canvas.width / grid;

let snake = [{x:8,y:8}];
let dir = {x:1,y:0};
let food = randFood();

let score = 0;
let best = 0;
let speed = 120;

function randFood(){
  return {
    x: Math.floor(Math.random()*grid),
    y: Math.floor(Math.random()*grid)
  };
}

function setDir(x,y){
  // 防止反向
  if(snake.length>1){
    if(x === -dir.x && y === -dir.y) return;
  }
  dir = {x,y};
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") setDir(0,-1);
  if(e.key==="ArrowDown") setDir(0,1);
  if(e.key==="ArrowLeft") setDir(-1,0);
  if(e.key==="ArrowRight") setDir(1,0);
});

function update(){

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // 撞墙
  if(head.x<0||head.y<0||head.x>=grid||head.y>=grid){
    reset();
    return;
  }

  // 撞自己
  for(let s of snake){
    if(s.x===head.x && s.y===head.y){
      reset();
      return;
    }
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    best = Math.max(best, score);
    document.getElementById("score").innerText = score;
    document.getElementById("best").innerText = best;
    food = randFood();
  }else{
    snake.pop();
  }
}

function draw(){

  ctx.fillStyle="#0b0618";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 食物
  ctx.fillStyle="red";
  ctx.fillRect(food.x*size,food.y*size,size,size);

  // 蛇
  ctx.fillStyle="lime";
  for(let s of snake){
    ctx.fillRect(s.x*size,s.y*size,size-2,size-2);
  }
}

function reset(){
  snake = [{x:8,y:8}];
  dir = {x:1,y:0};
  score = 0;
  document.getElementById("score").innerText = 0;
}

function loop(){
  update();
  draw();
}

setInterval(loop, speed);

</script>

</body>
</html>
