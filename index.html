<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>刘星快跑 Mobile</title>

<style>
body{
  margin:0;
  background:#1a0533;
  font-family:SimHei;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#top{
  width:100%;
  max-width:520px;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

#game{
  width:100%;
  max-width:520px;
  position:relative;
}

canvas{
  width:100%;
  height:240px;
  border:1px solid rgba(255,255,255,.15);
  display:block;
}

#start{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input,button{
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
}

button{
  background:#7c3aed;
  color:#fff;
}

#lb{
  width:100%;
  max-width:520px;
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
}

#controls{
  width:100%;
  max-width:520px;
  display:flex;
  gap:10px;
  margin-top:10px;
}

#controls button{
  flex:1;
  height:60px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="top">
<div>分数：<b id="score">0</b></div>
<div>最高：<b id="best">0</b></div>
</div>

<div id="game">
<canvas id="c"></canvas>

<div id="start">
<h3>刘星快跑</h3>
<input id="name" placeholder="输入名字">
<button onclick="startGame()">开始</button>
</div>
</div>

<div id="lb">排行榜加载中...</div>

<div id="controls">
<button id="jumpBtn">跳跃</button>
</div>

<script>

// ================= SUPABASE =================
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8"; // ← 改这里

async function submitScore(name,score){
  await fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({name,score})
  });
}

async function loadLB(){
  const r = await fetch(
    SUPABASE_URL+"/rest/v1/leaderboard?select=name,score&order=score.desc&limit=10",
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:"Bearer "+SUPABASE_KEY
      }
    }
  );

  const d = await r.json();

  document.getElementById("lb").innerHTML =
    "<b>🏆排行榜</b><br>" +
    d.map((x,i)=>`${i+1}. ${x.name} - ${x.score}`).join("<br>");
}

// ================= CANVAS =================
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = 240 * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",resize);
resize();

const W = () => canvas.clientWidth;
const GROUND = 190;

// ================= GAME =================
const GRAVITY = 1800;
const JUMP_V = -650;

let state="idle";
let score=0,best=0;

let player={
  x:80,
  y:GROUND,
  vy:0,
  hitW:26,
  grounded:true
};

let obs=[];
let spawnTimer=0;
let speed=260;
let playerName="玩家";
let lbTimer=0;

// ================= INPUT =================
function jump(){
  if(!player.grounded) return;
  player.vy=JUMP_V;
  player.grounded=false;
}

document.getElementById("jumpBtn").addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  if(state!=="run") startGame();
  jump();
},{passive:false});

// ================= START =================
function startGame(){
  playerName=document.getElementById("name").value||"玩家";

  state="run";
  score=0;

  player.y=GROUND;
  player.vy=0;
  player.grounded=true;

  obs=[];
  spawnTimer=0;

  document.getElementById("start").style.display="none";

  loadLB();
}

// ================= SPAWN =================
function spawn(){
  let y = Math.random()<0.5 ? GROUND : GROUND-60;

  obs.push({x:W(),y,label:"黄",h:34});
  obs.push({x:W()+26,y,label:"玲",h:34});
}

// ================= 碰撞 =================
function collide(o){

  const px1 = player.x - player.hitW/2;
  const px2 = player.x + player.hitW/2;

  const py1 = player.y - 34;
  const py2 = player.y;

  const textW = ctx.measureText(o.label).width;

  const ox1 = o.x - textW/2;
  const ox2 = o.x + textW/2;

  const oy1 = o.y - o.h;
  const oy2 = o.y;

  return px1<ox2 && px2>ox1 && py1<oy2 && py2>oy1;
}

// ================= GAME OVER =================
function over(){
  state="dead";

  best=Math.max(best,Math.floor(score));
  document.getElementById("best").textContent=best;

  submitScore(playerName,Math.floor(score)).then(loadLB);

  document.getElementById("start").style.display="flex";
}

// ================= UPDATE =================
function update(dt){

  if(state!=="run") return;

  score += dt*10;
  document.getElementById("score").textContent=Math.floor(score);

  speed = 260 + score*0.5;

  if(!player.grounded){
    player.vy += GRAVITY*dt;
    player.y += player.vy*dt;

    if(player.y>=GROUND){
      player.y=GROUND;
      player.vy=0;
      player.grounded=true;
    }
  }

  spawnTimer -= dt;
  if(spawnTimer<=0){
    spawn();
    spawnTimer = 1 + Math.random()*0.8;
  }

  obs.forEach(o=>o.x -= speed*dt);
  obs = obs.filter(o=>o.x>-100);

  for(let o of obs){
    if(collide(o)){
      over();
      return;
    }
  }

  // 🔥排行榜低频刷新（关键优化）
  lbTimer += dt;
  if(lbTimer>5){
    loadLB();
    lbTimer=0;
  }
}

// ================= DRAW =================
function draw(){

  ctx.clearRect(0,0,W(),240);

  ctx.fillStyle="#1a0533";
  ctx.fillRect(0,0,W(),240);

  ctx.strokeStyle="rgba(255,255,255,0.2)";
  ctx.beginPath();
  ctx.moveTo(0,GROUND);
  ctx.lineTo(W(),GROUND);
  ctx.stroke();

  // 刘星（柔和）
  ctx.save();
  ctx.font="bold 28px SimHei";
  ctx.textAlign="center";
  ctx.textBaseline="bottom";
  ctx.fillStyle="#e6d6ff";
  ctx.shadowColor="#a855f7";
  ctx.shadowBlur=6;
  ctx.fillText("刘星",player.x,player.y);
  ctx.restore();

  // 黄玲
  ctx.font="22px SimHei";
  ctx.fillStyle="#fbbf24";

  obs.forEach(o=>{
    ctx.fillText(o.label,o.x,o.y);
  });
}

// ================= LOOP =================
let last=0;

function loop(t){
  if(!last) last=t;
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>

</body>
</html>
