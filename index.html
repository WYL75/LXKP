<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘星快跑</title><style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(180deg,#1a0533 0%,#3d1a6e 40%,#7b3fa0 70%,#c97fd4 90%,#f0c4e0 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:SimHei;
  overflow:hidden;
}

#game-wrapper { width:800px; max-width:100vw; }

#score-board {
  display:flex;
  justify-content:space-between;
  padding:8px 16px;
  color:#f0e0ff;
  font-size:18px;
  text-shadow:0 0 10px #a855f7;
}

#game-canvas-wrap {
  position:relative;
  height:220px;
  border-top:2px solid rgba(168,85,247,.4);
  border-bottom:2px solid rgba(168,85,247,.4);
}

#overlay {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(10,0,20,.55);
  color:#f0e0ff;
  z-index:10;
}

#start-panel {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(10,0,20,.75);
  z-index:20;
}

#start-panel input {
  padding:10px;
  border-radius:10px;
  border:none;
  text-align:center;
  margin-bottom:10px;
  width:160px;
}

#start-panel button {
  padding:10px 20px;
  border-radius:10px;
  border:none;
  background:#7c3aed;
  color:#fff;
  font-size:16px;
}

#leaderboard {
  margin-top:16px;
  background:rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 20px;
  color:#f0e0ff;
}

#controls {
  display:flex;
  width:800px;
  max-width:100vw;
  gap:10px;
  margin-top:10px;
}

#controls button {
  flex:1;
  height:64px;
  border-radius:16px;
  border:2px solid rgba(168,85,247,.5);
  background:rgba(124,58,237,.3);
  color:#fff;
  font-size:22px;
}
</style></head><body><div id="game-wrapper"><div id="score-board">
<span>得分：<b id="score">0</b></span>
<span>最高：<b id="best">0</b></span>
</div><div id="game-canvas-wrap">
<canvas id="game-canvas" width="800" height="220"></canvas><div id="overlay">
<div class="title">刘星快跑</div>
<div class="hint">游戏中</div>
</div><div id="start-panel">
<h2 style="color:#fff;margin-bottom:10px;">刘星快跑</h2>
<input id="name-input" maxlength="8" placeholder="输入名字">
<button id="start-btn">开始游戏</button>
</div></div><div id="leaderboard">
<h3>🏆 排行榜</h3>
<div id="lb-list">加载中...</div>
</div></div><div id="controls">
<button id="btn-duck">蹲下</button>
<button id="btn-jump">跳跃</button>
</div><script>

// ================= SUPABASE =================
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

let playerName = "玩家";

async function submitScore(name, score) {
  await fetch(SUPABASE_URL + "/rest/v1/leaderboard", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, score })
  });
}

async function loadLeaderboard() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/leaderboard?select=name,score&order=score.desc&limit=10",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  document.getElementById("lb-list").innerHTML =
    data.map((r,i)=>`<div>${i+1}. ${r.name} - ${r.score}</div>`).join("");
}

// ================= GAME =================
const canvas=document.getElementById("game-canvas");
const ctx=canvas.getContext("2d");

const W=800,H=220;
const GROUND=H-40;

let state="idle",score=0,bestScore=0,frame=0,speed=5;

const player={x:100,y:GROUND,vy:0,grounded:true,ducking:false};
let obstacles=[];

function spawnObstacle(){
if(Math.random()<0.6){
obstacles.push({type:"ground",x:W,y:GROUND,size:32,label:"黄玲",w:28,h:32});
}else{
let r=Math.random();
let y=r<0.33?GROUND-40:r<0.66?GROUND-55:GROUND-120;
obstacles.push({type:"sky",x:W,y:y,size:36,label:"一",w:40,h:22});
}
}

let nextSpawn=80;

function jump(){
if(!player.grounded)return;
player.vy=-13;
player.grounded=false;
}

function duck(on){player.ducking=on;}

function startGame(){
state="running";
score=0;frame=0;speed=5;obstacles=[];
document.getElementById("start-panel").style.display="none";
document.getElementById("overlay").style.display="none";
}

function gameOver(){
state="dead";
bestScore=Math.max(bestScore,score);
document.getElementById("best").textContent=bestScore;

submitScore(playerName,score).then(loadLeaderboard);

document.getElementById("overlay").style.display="flex";
document.querySelector("#overlay .title").textContent="游戏结束";
document.querySelector("#overlay .hint").textContent="点击开始重新";
}

function collides(o){
const pH=player.ducking?18:34;
const px1=player.x-30;
const px2=player.x+30;
const py1=player.y-pH+(player.ducking?10:0);
const py2=player.y;

const ox1=o.x-o.w/2;
const ox2=o.x+o.w/2;
const oy1=o.y-o.h;
const oy2=o.y;

return px1<ox2&&px2>ox1&&py1<oy2&&py2>oy1;
}

function update(){
if(state!=="running")return;

frame++;
score=Math.floor(frame/6);
document.getElementById("score").textContent=score;

speed=5+score*0.003;

if(!player.grounded){
player.vy+=0.7;
player.y+=player.vy;
if(player.y>=GROUND){
player.y=GROUND;
player.vy=0;
player.grounded=true;
}
}

nextSpawn--;
if(nextSpawn<=0){
spawnObstacle();
nextSpawn=Math.max(55,80+Math.random()*80-speed);
}

obstacles.forEach(o=>o.x-=speed);
obstacles=obstacles.filter(o=>o.x>-50);

for(const o of obstacles){
if(collides(o)){gameOver();return;}
}
}

function draw(){
ctx.clearRect(0,0,W,H);

ctx.fillStyle="#1a0533";
ctx.fillRect(0,0,W,H);

ctx.fillStyle="#fff";
ctx.font="36px SimHei";
ctx.fillText("刘星",player.x,player.y);

obstacles.forEach(o=>{
ctx.font=`${o.size}px SimHei`;
ctx.fillStyle=o.type==="sky"?"#fde68a":"#fda4af";
ctx.fillText(o.label,o.x,o.y);
});
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

// ================= CONTROLS =================
document.getElementById("start-btn").onclick=()=>{
playerName=document.getElementById("name-input").value||"玩家";
startGame();
};

const isTouch="ontouchstart"in window;

document.getElementById("btn-jump")
.addEventListener(isTouch?"touchstart":"mousedown",()=>{
if(state!=="running")return;
jump();
});

document.getElementById("btn-duck")
.addEventListener(isTouch?"touchstart":"mousedown",()=>duck(true));

document.getElementById("btn-duck")
.addEventListener(isTouch?"touchend":"mouseup",()=>duck(false));

// init
loadLeaderboard();

</script></body>
</html>
