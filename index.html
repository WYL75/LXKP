<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>刘星快跑</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:linear-gradient(180deg,#1a0533,#7b3fa0);
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:SimHei;
  overflow:hidden;
}

#wrap{width:800px;max-width:100vw;}

#top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  color:#fff;
}

#game{
  position:relative;
  height:220px;
  border:2px solid rgba(255,255,255,.2);
}

canvas{width:100%;height:100%;}

#start{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.6);
}

#start input{
  padding:10px;
  border:none;
  border-radius:8px;
  text-align:center;
  margin-bottom:10px;
}

#start button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:#fff;
}

#lb{
  margin-top:10px;
  color:#fff;
  background:rgba(255,255,255,.1);
  padding:10px;
  border-radius:10px;
}

button{
  flex:1;
  padding:20px;
}
</style>
</head>

<body>

<div id="wrap">

<div id="top">
<div>得分：<b id="score">0</b></div>
<div>最高：<b id="best">0</b></div>
</div>

<div id="game">
<canvas id="c" width="800" height="220"></canvas>

<div id="start">
<h2 style="color:#fff;margin-bottom:10px;">刘星快跑</h2>
<input id="name" placeholder="输入名字" maxlength="8"/>
<button onclick="startGame()">开始</button>
</div>

</div>

<div id="lb">加载中...</div>

<div style="display:flex;margin-top:10px;">
<button onclick="jump()">跳</button>
<button onmousedown="duck(true)" onmouseup="duck(false)">蹲</button>
</div>

</div>

<script>

const SUPABASE_URL="https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

let playerName="玩家";

async function submitScore(name,score){
  await fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({name,score})
  });
}

async function loadLB(){
  const r=await fetch(
    SUPABASE_URL+"/rest/v1/leaderboard?select=name,score&order=score.desc&limit=10",
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:"Bearer "+SUPABASE_KEY
      }
    }
  );
  const d=await r.json();
  document.getElementById("lb").innerHTML =
    d.map((x,i)=>`${i+1}. ${x.name} - ${x.score}`).join("<br>");
}

// ================= GAME =================
const ctx=document.getElementById("c").getContext("2d");
const W=800,H=220,G=180;

let state="idle",score=0,best=0,f=0,speed=5;
let y=G,vy=0,ground=true,ducking=false;
let obs=[],next=60;

function startGame(){
  playerName=document.getElementById("name").value||"玩家";
  state="run";
  score=0;f=0;speed=5;obs=[];
  y=G;vy=0;ground=true;
  document.getElementById("start").style.display="none";
}

function jump(){
  if(!ground)return;
  vy=-12;
  ground=false;
}

function duck(v){ducking=v;}

function spawn(){
  if(Math.random()<0.6){
    obs.push({x:W,y:G,w:30,h:30,t:"A"});
  }else{
    obs.push({x:W,y:G-60,w:40,h:10,t:"B"});
  }
}

function hit(o){
  return Math.abs(o.x-100)<30 &&
  y > o.y - o.h;
}

function over(){
  state="dead";
  best=Math.max(best,score);
  document.getElementById("best").textContent=best;

  submitScore(playerName,score).then(loadLB);

  document.getElementById("start").style.display="flex";
}

function update(){
  if(state!=="run")return;

  f++;
  score=Math.floor(f/6);
  document.getElementById("score").textContent=score;

  if(!ground){
    vy+=0.7;
    y+=vy;
    if(y>=G){y=G;vy=0;ground=true;}
  }

  next--;
  if(next<=0){
    spawn();
    next=60+Math.random()*60;
  }

  obs.forEach(o=>o.x-=speed);
  obs=obs.filter(o=>o.x>-50);

  for(let o of obs){
    if(hit(o)){over();return;}
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#1a0533";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="#fff";
  ctx.fillText("刘星",100,y);

  obs.forEach(o=>{
    ctx.fillText(o.t,o.x,o.y);
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

document.addEventListener("keydown",e=>{
  if(e.code==="Space")jump();
});

loadLB();

</script>

</body>
</html>
