<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘星快跑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #1a0533 0%, #3d1a6e 40%, #7b3fa0 70%, #c97fd4 90%, #f0c4e0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "SimHei", "黑体", sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: 800px;
    max-width: 100vw;
  }

  #score-board {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    color: #f0e0ff;
    font-size: 18px;
    text-shadow: 0 0 10px #a855f7;
  }

  #hi-score { color: #e879f9; }

  #game-canvas-wrap {
    position: relative;
    width: 800px;
    max-width: 100vw;
    height: 220px;
    overflow: hidden;
    border-top: 2px solid rgba(168,85,247,0.4);
    border-bottom: 2px solid rgba(168,85,247,0.4);
  }

  #game-canvas {
    width: 100%;
    height: 100%;
  }

  #leaderboard {
    margin-top: 16px;
    width: 800px;
    max-width: 100vw;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 20px;
    color: #f0e0ff;
  }

  #leaderboard h3 {
    font-size: 14px;
    color: #e879f9;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  #lb-list { font-size: 13px; line-height: 2; }

  #lb-list .lb-row {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(10,0,20,0.55);
    color: #f0e0ff;
    pointer-events: none;
  }

  #overlay.hidden { display: none; }

  #overlay .title {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 20px #e879f9;
  }

  #overlay .hint {
    font-size: 14px;
    color: #c4b5fd;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  #name-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #name-modal.hidden { display: none; }

  #name-modal .box {
    background: #2d0a4e;
    border: 1px solid #a855f7;
    border-radius: 16px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    color: #f0e0ff;
  }

  #name-modal h2 { font-size: 20px; color: #e879f9; }

  #name-input {
    background: rgba(255,255,255,0.1);
    border: 1px solid #a855f7;
    border-radius: 8px;
    padding: 8px 16px;
    color: #f0e0ff;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    width: 200px;
    text-align: center;
  }

  #name-submit {
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 28px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }

  #name-submit:hover { background: #6d28d9; }

  #controls {
    display: flex;
    justify-content: space-between;
    width: 800px;
    max-width: 100vw;
    padding: 12px 20px;
    gap: 20px;
    margin-top: 10px;
  }

  #controls button {
    flex: 1;
    height: 64px;
    border-radius: 16px;
    border: 2px solid rgba(168,85,247,0.5);
    background: rgba(124,58,237,0.3);
    color: #f0e0ff;
    font-size: 22px;
    font-family: SimHei, 黑体, sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #controls button:active {
    background: rgba(124,58,237,0.6);
  }
</style>
</head>
<body>

<!-- 昵称输入弹窗 -->
<div id="name-modal">
  <div class="box">
    <h2>🎮 刘星快跑</h2>
    <p style="font-size:13px;color:#c4b5fd">输入你的名字上排行榜</p>
    <input id="name-input" type="text" maxlength="8" placeholder="你的名字" />
    <button id="name-submit">开始</button>
  </div>
</div>

<div id="game-wrapper">
  <div id="score-board">
    <span>得分：<b id="score">0</b></span>
    <span id="hi-score">最高：<b id="best">0</b></span>
  </div>

  <div id="game-canvas-wrap">
    <canvas id="game-canvas" width="800" height="220"></canvas>
    <div id="overlay">
      <div class="title">刘星快跑</div>
      <div class="hint">按跳跃键开始</div>
    </div>
  </div>

  <div id="leaderboard">
    <h3>🏆 排行榜</h3>
    <div id="lb-list"><div style="color:#888;font-size:12px">加载中…</div></div>
  </div>
</div>

<div id="controls">
  <button id="btn-duck"
    ontouchstart="duck(true)" ontouchend="duck(false)"
    onmousedown="duck(true)" onmouseup="duck(false)">蹲下</button>
  <button id="btn-jump"
    ontouchstart="handleJump()" onmousedown="handleJump()">跳跃</button>
</div>

<script>
// ─── Supabase ───────────────────────────────────────────────
const SUPABASE_URL = 'https://txwskivbvslcammgdbzw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8';

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...(options.headers || {})
    }
  });
  if (res.status === 204 || res.headers.get('content-length') === '0') return null;
  return res.json();
}

async function submitScore(name, score) {
  await sbFetch('/rest/v1/leaderboard', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ name, score })
  });
}

async function loadLeaderboard() {
  const data = await sbFetch('/rest/v1/leaderboard?order=score.desc&limit=10', {
    headers: { 'Prefer': '' }
  });
  const el = document.getElementById('lb-list');
  if (!data || !data.length) { el.innerHTML = '<div style="color:#888;font-size:12px">暂无记录</div>'; return; }
  el.innerHTML = data.map((r, i) =>
    `<div class="lb-row"><span>${['🥇','🥈','🥉'][i] || (i+1+'.')} ${r.name}</span><span>${r.score}</span></div>`
  ).join('');
}

// ─── Game ───────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 220;
const GROUND = H - 40;

let playerName = '匿名';
let state = 'idle';
let score = 0, bestScore = 0, frame = 0;
let speed = 5;

const player = {
  x: 100,
  y: GROUND,
  vy: 0,
  grounded: true,
  ducking: false,
  baseFontSize: 36,
  duckFontSize: 20,
  label: '刘星',
  wobble: 0
};

function playerH() { return player.ducking ? player.duckFontSize : player.baseFontSize; }
function playerW() { return player.ducking ? 44 : 72; }

let obstacles = [];
let particles = [];

let stars = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * (GROUND - 40),
  r: Math.random() * 1.5 + 0.3,
  a: Math.random()
}));

function spawnObstacle() {
  const roll = Math.random();
  if (roll < 0.25 && score > 200) {
    // 组合：地面黄玲 + 中空"一"，逼玩家两难
    const size = 28 + Math.floor(Math.random() * 16);
    obstacles.push({ type: 'ground', x: W + 10, y: GROUND - size + 10, size, label: '黄玲', w: size * 2.2 });
    obstacles.push({ type: 'sky', x: W + 120, y: GROUND - player.baseFontSize - 10, size: 32, label: '一', w: 32 });
  } else if (roll < 0.6) {
    // 普通地面障碍
    const size = 24 + Math.floor(Math.random() * 24);
    obstacles.push({ type: 'ground', x: W + 10, y: GROUND - size + 10, size, label: '黄玲', w: size * 2.2 });
  } else {
    // 空中障碍：高空可蹲过，中空必须跳过
    const highOrMid = Math.random() < 0.5;
    const y = highOrMid ? 40 + Math.random() * 30 : GROUND - player.baseFontSize - 5;
    obstacles.push({ type: 'sky', x: W + 10, y, size: 32, label: '一', w: 32 });
  }
}

let nextSpawn = 80;

function jump() {
  if (!player.grounded) return;
  player.vy = -13;
  player.grounded = false;
}

function duck(on) {
  player.ducking = on;
}

function handleJump() {
  if (state === 'idle' || state === 'dead') startGame();
  else jump();
}

function startGame() {
  if (state === 'running') return;
  state = 'running';
  score = 0; frame = 0; speed = 5;
  obstacles = []; particles = [];
  player.y = GROUND; player.vy = 0; player.grounded = true;
  player.ducking = false;
  nextSpawn = 80;
  document.getElementById('overlay').classList.add('hidden');
}

function gameOver() {
  state = 'dead';
  if (score > bestScore) bestScore = score;
  document.getElementById('best').textContent = bestScore;
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: player.x, y: player.y,
      vx: (Math.random()-0.5)*6, vy: -Math.random()*8,
      life: 1, char: ['刘','星','！','？','…'][Math.floor(Math.random()*5)]
    });
  }
  submitScore(playerName, score).then(loadLeaderboard);

  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML = `
    <div class="title">黄玲抓住了！</div>
    <div style="font-size:16px;color:#e879f9">得分：${score}</div>
    <div class="hint">按跳跃键重新开始</div>
  `;
}

function collides(o) {
  const pw = playerW();
  const px1 = player.x - pw/2 + 8, px2 = player.x + pw/2 - 8;
  const py2 = player.y;
  const py1 = player.ducking ? player.y - player.duckFontSize : player.y - player.baseFontSize;
  const ox1 = o.x - o.w/2 + 4, ox2 = o.x + o.w/2 - 4;
  const oy2 = o.y;
  const oy1 = o.y - o.size;
  // 地面障碍蹲下也撞（蹲下躲不了黄玲）
  if (o.type === 'ground') {
    return px1 < ox2 && px2 > ox1 && py2 > oy1;
  }
  return px1 < ox2 && px2 > ox1 && py1 < oy2 && py2 > oy1;
}

function update() {
  if (state !== 'running') return;
  frame++;
  score = Math.floor(frame / 6);
  document.getElementById('score').textContent = score;
  speed = 5 + score * 0.004;

  stars.forEach(s => { s.x -= speed * 0.15; if (s.x < 0) s.x = W; });

  player.wobble = Math.sin(frame * 0.35) * 3;
  if (!player.grounded) {
    player.vy += 0.7;
    player.y += player.vy;
    if (player.y >= GROUND) {
      player.y = GROUND; player.vy = 0;
      player.grounded = true;
    }
  }

  nextSpawn--;
  if (nextSpawn <= 0) {
    spawnObstacle();
    nextSpawn = Math.floor(60 + Math.random() * 80 - speed * 2);
    nextSpawn = Math.max(nextSpawn, 40);
  }
  obstacles.forEach(o => { o.x -= speed; });
  obstacles = obstacles.filter(o => o.x > -80);

  for (const o of obstacles) {
    if (collides(o)) { gameOver(); return; }
  }

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.03;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawStars() {
  stars.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.a * 0.8;
    ctx.fillStyle = '#f0e0ff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawGround() {
  ctx.strokeStyle = 'rgba(168,85,247,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND + 2);
  ctx.lineTo(W, GROUND + 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(168,85,247,0.25)';
  for (let i = 0; i < W; i += 30 + Math.sin(i)*8) {
    ctx.fillRect(i, GROUND + 4, 10 + Math.sin(i*0.1)*6, 1.5);
  }
}

function drawPlayer() {
  const fs = player.ducking ? player.duckFontSize : player.baseFontSize;
  ctx.save();
  ctx.font = `bold ${fs}px SimHei, 黑体, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = '#e879f9';
  ctx.shadowBlur = 14;
  ctx.fillStyle = '#ffffff';
  const drawX = player.x + (state === 'running' ? player.wobble : 0);
  ctx.fillText(player.label, drawX, player.y);
  ctx.restore();
}

function drawObstacles() {
  obstacles.forEach(o => {
    ctx.save();
    ctx.font = `bold ${o.size}px SimHei, 黑体, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.shadowColor = o.type === 'sky' ? '#fbbf24' : '#f43f5e';
    ctx.shadowBlur = 12;
    ctx.fillStyle = o.type === 'sky' ? '#fde68a' : '#fda4af';
    ctx.fillText(o.label, o.x, o.y);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.font = `bold 18px SimHei`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e879f9';
    ctx.fillText(p.char, p.x, p.y);
    ctx.restore();
  });
}

function drawScore() {
  if (state !== 'running') return;
  ctx.save();
  ctx.font = '14px SimHei';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(240,224,255,0.6)';
  ctx.fillText(`× ${score}`, W - 10, 24);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0533');
  grad.addColorStop(0.6, '#3d1a6e');
  grad.addColorStop(1, '#7b3fa0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawGround();
  drawObstacles();
  drawPlayer();
  drawParticles();
  drawScore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── 键盘控制 ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleJump();
  }
  if (e.code === 'ArrowDown') { e.preventDefault(); duck(true); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') duck(false);
});

// ─── 昵称弹窗 ────────────────────────────────────────────────
document.getElementById('name-submit').addEventListener('click', () => {
  const v = document.getElementById('name-input').value.trim();
  if (v) playerName = v;
  document.getElementById('name-modal').classList.add('hidden');
  loadLeaderboard();
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('name-submit').click();
});

// ─── 启动 ────────────────────────────────────────────────────
loadLeaderboard();
loop();
</script>
</body>
</html>
