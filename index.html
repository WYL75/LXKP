<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘星快跑 完整版</title>

<style>
body{
  margin:0;
  background:#1a0533;
  font-family:SimHei;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#top{
  width:800px;
  max-width:100vw;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

#game{
  position:relative;
  width:800px;
  height:220px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
}

canvas{width:100%;height:100%;}

#start{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.65);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

input{
  padding:10px;
  text-align:center;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:#fff;
}
</style>
</head>

<body>

<div id="top">
<div>分数：<b id="score">0</b></div>
<div>最高：<b id="best">0</b></div>
</div>

<div id="game">
<canvas id="c" width="800" height="220"></canvas>

<div id="start">
<h2>刘星快跑</h2>
<input id="name" placeholder="输入名字" maxlength="8">
<button onclick="startGame()">开始游戏</button>
</div>
</div>

<div style="width:800px;max-width:100vw;margin-top:10px">
<h3>🏆 排行榜</h3>
<div id="lb">加载中...</div>
</div>

<div style="width:800px;max-width:100vw;display:flex;gap:10px;margin-top:10px">
<button onclick="jump()">跳跃</button>
<button ontouchstart="duck(true)" ontouchend="duck(false)"
        onmousedown="duck(true)" onmouseup="duck(false)">
蹲下
</button>
</div>

<script>

// ================= SUPABASE =================

const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8"; // 👈 改这里

async function submitScore(name,score){

  await fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({name,score})
  });
}

async function loadLB(){

  const r = await fetch(
    SUPABASE_URL+"/rest/v1/leaderboard?select=name,score&order=score.desc&limit=10",
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:"Bearer "+SUPABASE_KEY
      }
    }
  );

  const d = await r.json();

  document.getElementById("lb").innerHTML =
    d.map((x,i)=>`${i+1}. ${x.name} - ${x.score}`).join("<br>");
}

// ================= GAME =================

const ctx=document.getElementById("c").getContext("2d");

const W=800;
const GROUND=180;

const GRAVITY=0.6;
const JUMP_V=-11;

let state="idle";
let score=0,best=0,frame=0,speed=6;

let ducking=false;

let player={
  x:100,
  y:GROUND,
  vy:0,
  w:60,
  h:34,
  grounded:true
};

let obs=[];
let next=60;
let playerName="玩家";

// ================= START =================

function startGame(){

  playerName=document.getElementById("name").value||"玩家";

  state="run";
  score=0;
  frame=0;
  speed=6;
  obs=[];
  next=60;

  player.y=GROUND;
  player.vy=0;
  player.grounded=true;

  document.getElementById("start").style.display="none";
}

// ================= INPUT =================

function jump(){
  if(!player.grounded) return;
  player.vy=JUMP_V;
  player.grounded=false;
}

function duck(v){
  ducking=v;
}

// ================= SPAWN（机制版） =================

function spawn(){

  const r=Math.random();

  // 🟥 上下结构（必须跳）
  if(r<0.35){
    obs.push({
      x:W,
      type:"stack",
      y:GROUND,
      w:50,
      h:50
    });
    return;
  }

  // 🟨 Dino三态（跳 / 蹲 / 无操作）
  const mode=Math.random();
  let y;

  if(mode<0.33) y=GROUND;        // 跳
  else if(mode<0.66) y=GROUND-60; // 蹲
  else y=GROUND-120;             // 无操作

  obs.push({
    x:W,
    type:"single",
    y,
    w:50,
    h:34
  });
}

// ================= COLLISION =================

function getPH(){
  return ducking?20:34;
}

function collide(o){

  const px1=player.x-player.w/2;
  const px2=player.x+player.w/2;
  const py1=player.y-getPH();
  const py2=player.y;

  const ox1=o.x-o.w/2;
  const ox2=o.x+o.w/2;
  const oy1=o.y-o.h;
  const oy2=o.y;

  return px1<ox2&&px2>ox1&&py1<oy2&&py2>oy1;
}

// ================= GAME OVER =================

function over(){

  state="dead";

  best=Math.max(best,score);
  document.getElementById("best").textContent=best;

  submitScore(playerName,score).then(loadLB);

  document.getElementById("start").style.display="flex";
}

// ================= UPDATE =================

function update(){

  if(state!=="run") return;

  frame++;
  score=Math.floor(frame/6);
  document.getElementById("score").textContent=score;

  speed=6+score*0.003;
  if(speed>18) speed=18;

  // physics
  if(!player.grounded){
    player.vy+=GRAVITY;
    player.y+=player.vy;

    if(player.y>=GROUND){
      player.y=GROUND;
      player.vy=0;
      player.grounded=true;
    }
  }

  // spawn
  next--;
  if(next<=0){
    spawn();
    next=60+Math.random()*60;
  }

  // move
  obs.forEach(o=>o.x-=speed);
  obs=obs.filter(o=>o.x>-100);

  // collision
  for(let o of obs){
    if(collide(o)){
      over();
      return;
    }
  }
}

// ================= DRAW =================

function draw(){

  ctx.clearRect(0,0,W,220);

  // background
  ctx.fillStyle="#1a0533";
  ctx.fillRect(0,0,W,220);

  // ground
  ctx.strokeStyle="rgba(255,255,255,0.2)";
  ctx.beginPath();
  ctx.moveTo(0,GROUND);
  ctx.lineTo(W,GROUND);
  ctx.stroke();

  // player 刘星
  ctx.font="36px SimHei";
  ctx.textAlign="center";
  ctx.textBaseline="bottom";
  ctx.fillStyle="#fff";
  ctx.fillText("刘星",player.x,player.y);

  // obstacles 黄玲
  ctx.font="28px SimHei";

  obs.forEach(o=>{

    if(o.type==="stack"){
      ctx.fillStyle="#fda4af";
      ctx.fillText("黄",o.x,o.y-25);
      ctx.fillText("玲",o.x,o.y);
    }else{
      ctx.fillStyle="#fbbf24";
      ctx.fillText("黄玲",o.x,o.y);
    }
  });
}

// ================= LOOP =================

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

loadLB();

</script>

</body>
</html>
