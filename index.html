<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘星快跑（精确碰撞版）</title>

<style>
body{
  margin:0;
  background:#1a0533;
  font-family:SimHei;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  user-select:none;
}

#top{
  width:800px;
  max-width:100vw;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

#game{
  position:relative;
  width:800px;
  height:220px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
}

canvas{
  width:800px;
  height:220px;
  display:block;
}

#start{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.65);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

input{
  padding:10px;
  text-align:center;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:#fff;
}

#controls{
  width:800px;
  max-width:100vw;
  display:flex;
  gap:10px;
  margin-top:10px;
}

#controls button{
  flex:1;
  height:60px;
}
</style>
</head>

<body>

<div id="top">
<div>分数：<b id="score">0</b></div>
<div>最高：<b id="best">0</b></div>
</div>

<div id="game">
<canvas id="c" width="800" height="220"></canvas>

<div id="start">
<h2>刘星快跑</h2>
<input id="name" placeholder="输入名字">
<button onclick="startGame()">开始</button>
</div>
</div>

<div style="width:800px;margin-top:10px">
<h3>排行榜</h3>
<div id="lb">加载中...</div>
</div>

<div id="controls">
<button id="btnJump">跳跃</button>
<button id="btnDuck">蹲下</button>
</div>

<script>

// ================= SUPABASE =================
const SUPABASE_URL = "https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";

// ================= GAME =================
const ctx=document.getElementById("c").getContext("2d");

const W=800;
const GROUND=180;

const GRAVITY=0.6;
const JUMP_V=-11;

let state="idle";
let score=0,best=0,frame=0,speed=6;

let ducking=false;

// ✅ 视觉 + 碰撞分离（关键修复）
let player={
  x:100,
  y:GROUND,
  vy:0,
  w:60,      // 视觉宽度
  hitW:26,   // 🔥真实碰撞宽度（重点修复）
  grounded:true
};

let obs=[];
let next=60;
let playerName="玩家";

// ================= START =================
function startGame(){
  playerName=document.getElementById("name").value||"玩家";

  state="run";
  score=0;
  frame=0;
  speed=6;
  obs=[];
  next=60;

  player.y=GROUND;
  player.vy=0;
  player.grounded=true;

  document.getElementById("start").style.display="none";
}

// ================= INPUT =================
function jump(){
  if(!player.grounded) return;
  player.vy=JUMP_V;
  player.grounded=false;
}

function duck(v){
  ducking=v;
}

// ================= 低延迟输入 =================
document.getElementById("btnJump").addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  if(state!=="run") startGame();
  jump();
},{passive:false});

document.getElementById("btnDuck").addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  duck(true);
},{passive:false});

document.getElementById("btnDuck").addEventListener("pointerup",()=>duck(false));
document.getElementById("btnDuck").addEventListener("pointercancel",()=>duck(false));

// ================= SPAWN =================
function spawn(){
  const r=Math.random();

  if(r<0.35){
    obs.push({x:W,type:"stack",y:GROUND,w:50,h:50});
    return;
  }

  const mode=Math.random();
  let y;

  if(mode<0.33) y=GROUND;
  else if(mode<0.66) y=GROUND-60;
  else y=GROUND-120;

  obs.push({x:W,type:"single",y,w:50,h:34});
}

// ================= 精准碰撞 =================
function collide(o){

  const pw = player.hitW;

  const px1 = player.x - pw/2;
  const px2 = player.x + pw/2;

  // 🔥蹲下更精确
  const ph = ducking ? 22 : 34;
  const py1 = player.y - ph;
  const py2 = player.y;

  // 🔥障碍收缩（减少误判）
  const ox1 = o.x - o.w/2 + 5;
  const ox2 = o.x + o.w/2 - 5;
  const oy1 = o.y - o.h;
  const oy2 = o.y;

  return px1 < ox2 && px2 > ox1 && py1 < oy2 && py2 > oy1;
}

// ================= GAME OVER =================
function over(){
  state="dead";

  best=Math.max(best,score);
  document.getElementById("best").textContent=best;

  document.getElementById("start").style.display="flex";
}

// ================= UPDATE =================
function update(){

  if(state!=="run") return;

  frame++;
  score=Math.floor(frame/6);
  document.getElementById("score").textContent=score;

  speed=6+score*0.003;
  if(speed>18)speed=18;

  if(!player.grounded){
    player.vy+=GRAVITY;
    player.y+=player.vy;

    if(player.y>=GROUND){
      player.y=GROUND;
      player.vy=0;
      player.grounded=true;
    }
  }

  next--;
  if(next<=0){
    spawn();
    next=60+Math.random()*60;
  }

  obs.forEach(o=>o.x-=speed);
  obs=obs.filter(o=>o.x>-100);

  for(let o of obs){
    if(collide(o)){
      over();
      return;
    }
  }
}

// ================= DRAW =================
function draw(){

  ctx.clearRect(0,0,W,220);

  ctx.fillStyle="#1a0533";
  ctx.fillRect(0,0,W,220);

  ctx.strokeStyle="rgba(255,255,255,0.2)";
  ctx.beginPath();
  ctx.moveTo(0,GROUND);
  ctx.lineTo(W,GROUND);
  ctx.stroke();

  // ================= 刘星 =================
  ctx.save();
  ctx.font="bold 36px SimHei";
  ctx.textAlign="center";
  ctx.textBaseline="bottom";
  ctx.fillStyle="#fff";
  ctx.shadowColor="#e879f9";
  ctx.shadowBlur=12;

  ctx.fillText("刘星",player.x,player.y);
  ctx.restore();

  // ================= 黄玲 =================
  ctx.font="28px SimHei";
  obs.forEach(o=>{
    if(o.type==="stack"){
      ctx.fillStyle="#fda4af";
      ctx.fillText("黄",o.x,o.y-25);
      ctx.fillText("玲",o.x,o.y);
    }else{
      ctx.fillStyle="#fbbf24";
      ctx.fillText("黄玲",o.x,o.y);
    }
  });
}

// ================= LOOP =================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
