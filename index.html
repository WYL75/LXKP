<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘星快跑（修复版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:linear-gradient(180deg,#1a0533,#7b3fa0,#f0c4e0);
display:flex;flex-direction:column;align-items:center;justify-content:center;
min-height:100vh;font-family:SimHei;overflow:hidden;
}
#game-wrapper{width:800px;max-width:100vw;}
#score-board{display:flex;justify-content:space-between;color:#fff;padding:10px;}
#game-canvas-wrap{position:relative;height:220px;}
#overlay{
position:absolute;inset:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:rgba(0,0,0,.5);color:#fff;
}
.hidden{display:none;}
#controls{display:flex;margin-top:10px;gap:10px;width:800px;max-width:100vw;}
#controls button{flex:1;height:60px;font-size:20px;}
</style>
</head>
<body><div id="game-wrapper">
<div id="score-board">
<span>得分：<b id="score">0</b></span>
<span>最高：<b id="best">0</b></span>
</div><div id="game-canvas-wrap">
<canvas id="game-canvas" width="800" height="220"></canvas>
<div id="overlay">
<div class="title">刘星快跑</div>
<div class="hint">点击开始</div>
</div>
</div>
</div><div id="controls">
<button id="btn-duck">蹲下</button>
<button id="btn-jump">跳跃</button>
</div><script>
const USE_ONLINE=false;

const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');

const W=800,H=220;
const GROUND=H-40;

let PLAYER_W=60;

const PLAYER_H=34;
const PLAYER_DUCK_H=18;

let state='idle',score=0,bestScore=0,frame=0,speed=5;

const player={x:100,y:GROUND,vy:0,grounded:true,ducking:false};

let obstacles=[];

let stars=Array.from({length:60},()=>({
x:Math.random()*W,
y:Math.random()*(GROUND-40),
r:Math.random()*1.5
}));

function measurePlayer(){
ctx.font="bold 36px SimHei";
PLAYER_W=ctx.measureText('刘星').width;
}
measurePlayer();

function spawnObstacle(){
if(Math.random()<0.6){
obstacles.push({
type:'ground',
x:W+10,
y:GROUND,
size:32,
label:'黄玲',
w:28,
h:32
});
}else{
let y;
let r=Math.random();
if(r<0.33) y=GROUND-PLAYER_H-6;
else if(r<0.66) y=GROUND-55;
else y=GROUND-120;

obstacles.push({
type:'sky',
x:W+10,
y:y,
size:36,
label:'一',
w:40,
h:22
});
}
}

let nextSpawn=80;

function jump(){
if(!player.grounded)return;
player.vy=-13;
player.grounded=false;
}

function duck(on){player.ducking=on;}

function startGame(){
state='running';
score=0;frame=0;speed=5;
obstacles=[];
}

function gameOver(){
state='dead';
bestScore=Math.max(bestScore,score);
document.getElementById('best').textContent=bestScore;

const ov=document.getElementById('overlay');
ov.classList.remove('hidden');
ov.querySelector('.title').textContent='游戏结束';
ov.querySelector('.hint').textContent='点击重新开始';
}

function collides(o){
const pH=player.ducking?PLAYER_DUCK_H:PLAYER_H;
const px1=player.x-PLAYER_W/2;
const px2=player.x+PLAYER_W/2;
const py1=player.y-pH+(player.ducking?10:0);
const py2=player.y;

const ox1=o.x-o.w/2;
const ox2=o.x+o.w/2;
const oy1=o.y-o.h;
const oy2=o.y;

return px1<ox2&&px2>ox1&&py1<oy2&&py2>oy1;
}

function update(){
if(state!=='running')return;

frame++;
score=Math.floor(frame/6);
document.getElementById('score').textContent=score;

speed=5+score*0.003;

stars.forEach(s=>{
s.x-=speed*0.2;
if(s.x<0){
s.x=W;
s.y=Math.random()*(GROUND-40);
}
});

if(!player.grounded){
player.vy+=0.7;
player.y+=player.vy;
if(player.y>=GROUND){
player.y=GROUND;
player.vy=0;
player.grounded=true;
}
}

nextSpawn--;
if(nextSpawn<=0){
spawnObstacle();
nextSpawn=Math.max(55,80+Math.random()*80-speed);
}

obstacles.forEach(o=>o.x-=speed);
obstacles=obstacles.filter(o=>o.x>-50);

for(const o of obstacles){
if(collides(o)){gameOver();return;}
}
}

function draw(){
ctx.clearRect(0,0,W,H);

ctx.fillStyle="#1a0533";
ctx.fillRect(0,0,W,H);

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="#fff";
ctx.fill();
});

ctx.fillStyle="#aaa";
ctx.fillRect(0,GROUND,W,2);

ctx.font="bold 36px SimHei";
ctx.fillStyle="#fff";
ctx.fillText("刘星",player.x-20,player.y);

obstacles.forEach(o=>{
ctx.font=`bold ${o.size}px SimHei`;
ctx.fillStyle=o.type==='sky'?"yellow":"pink";
ctx.fillText(o.label,o.x,o.y);
});
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

const isTouch='ontouchstart'in window;

document.getElementById('btn-jump').addEventListener(isTouch?'touchstart':'mousedown',()=>{
if(state!=='running'){startGame();document.getElementById('overlay').classList.add('hidden');}
else jump();
});

document.getElementById('btn-duck').addEventListener(isTouch?'touchstart':'mousedown',()=>duck(true));
document.getElementById('btn-duck').addEventListener(isTouch?'touchend':'mouseup',()=>duck(false));

</script></body>
</html>
