<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>钢琴块</title>

<style>
body{
margin:0;
background:#1a0533;
color:white;
font-family:SimHei;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

#top{
width:360px;
display:flex;
justify-content:space-between;
padding:10px;
}

canvas{
background:white;
border-radius:8px;
}

#start{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:60px;
gap:15px;
}

input,button{
padding:10px;
border:none;
border-radius:8px;
}

button{
background:#7c3aed;
color:white;
}

#rank{
margin-top:10px;
line-height:2;

max-height:220px;      /* ⭐关键修复 */
overflow-y:auto;       /* ⭐关键修复 */
width:240px;
text-align:left;
}

</style>
</head>


<body>

<div id="top">
<div>分数: <b id="score">0</b></div>
</div>

<canvas id="game" width="360" height="600"></canvas>

<div id="start">
<h2>🎹 钢琴块</h2>
<input id="name" placeholder="输入名字">
<button onclick="startGame()">开始游戏</button>

<div id="rank">加载排行榜...</div>
</div>


<script>

// ===== Supabase =====
const SUPABASE_URL="https://txwskivbvslcammgdbzw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4d3NraXZidnNsY2FtbWdkYnp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDYxMjksImV4cCI6MjA5NzA4MjEyOX0.oCQvKbc7LrgiVXkIqOn8TkykxZvDfCq4cxRatdfRxS8";  // ⚠️必须替换

const GAME="piano";

async function submitScore(score){
let name=document.getElementById("name").value||"玩家";

await fetch(SUPABASE_URL+"/rest/v1/leaderboard",{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
score,
game_type:GAME
})
});

loadRank();
}

async function loadRank(){
const r=await fetch(
SUPABASE_URL+
"/rest/v1/leaderboard?select=name,score&game_type=eq.piano&order=score.desc&limit=10",
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
}
);

const data=await r.json();

document.getElementById("rank").innerHTML=
data.length
? "🏆排行榜<br>"+
data.map((x,i)=>`${i+1}. ${x.name} - ${x.score}`).join("<br>")
: "暂无数据";
}

loadRank();


// ===== 游戏 =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let blocks=[];
let score=0;
let speed=3;
let running=false;

const cols=4;
const w=canvas.width/cols;
const h=120;

function createBlock(){
let col=Math.floor(Math.random()*4);
blocks.push({x:col*w,y:-h});
}

function startGame(){
blocks=[];
score=0;
speed=3;
running=true;
document.getElementById("start").style.display="none";
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=1;i<4;i++){
ctx.strokeStyle="#ddd";
ctx.beginPath();
ctx.moveTo(i*w,0);
ctx.lineTo(i*w,600);
ctx.stroke();
}

blocks.forEach(b=>{
ctx.fillStyle="black";
ctx.fillRect(b.x,b.y,w,h);
});
}

function update(){
if(!running)return;

if(Math.random()<0.03){
createBlock();
}

blocks.forEach(b=>{
b.y+=speed;
});

for(let b of blocks){
if(b.y>600){
gameOver();
}
}

speed+=0.001;
}

canvas.addEventListener("pointerdown",e=>{
if(!running)return;

let rect=canvas.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let hit=false;

for(let i=blocks.length-1;i>=0;i--){
let b=blocks[i];

if(
x>b.x && x<b.x+w &&
y>b.y && y<b.y+h
){
blocks.splice(i,1);
score++;
document.getElementById("score").innerText=score;
hit=true;
break;
}
}

if(!hit){
gameOver();
}
});

function gameOver(){
if(!running)return;

running=false;
submitScore(score);

document.getElementById("start").style.display="flex";
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
